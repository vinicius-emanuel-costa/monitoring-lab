version: "3.8"

# ============================================
#  STACK: MONITORING LAB
#  Deploy via Portainer > Stacks > Add Stack
# ============================================

networks:
  lab-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1

services:

  # ─── MONITORAMENTO (Prometheus + Grafana + Zabbix) ───
  mon01:
    image: monitoring-lab/mon01:v1
    container_name: lab-mon01
    hostname: lab-mon01
    privileged: true
    cap_add:
      - ALL
    entrypoint: ["/entrypoint.sh"]
    environment:
      - TZ=America/Sao_Paulo
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - ./entrypoint-mon01.sh:/entrypoint.sh:ro
      - mon01-mysql:/var/lib/mysql
      - mon01-prometheus:/var/lib/prometheus
      - mon01-grafana:/opt/grafana/data
    networks:
      lab-internal:
        ipv4_address: 10.10.10.40
    ports:
      - "3000:3000"     # Grafana
      - "9090:9090"     # Prometheus
      - "8080:80"       # Zabbix Frontend
      - "9115:9115"     # Blackbox Exporter
      - "2240:22"       # SSH
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── WEB SERVER (LiteSpeed + PHP-FPM) ───
  web01:
    image: monitoring-lab/web01:v1
    container_name: lab-web01
    hostname: web01
    privileged: true
    cap_add:
      - ALL
    entrypoint: ["/entrypoint.sh"]
    environment:
      - TZ=America/Sao_Paulo
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - ./entrypoint-web01.sh:/entrypoint.sh:ro
      - web01-www:/var/www
    networks:
      lab-internal:
        ipv4_address: 10.10.10.10
    ports:
      - "8088:8088"     # LiteSpeed HTTP
      - "7080:7080"     # LiteSpeed Admin
      - "2210:22"       # SSH
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - mon01

  # ─── DATABASE (MariaDB) ───
  db01:
    image: monitoring-lab/db01:v1
    container_name: lab-db01
    hostname: lab-db01
    privileged: true
    cap_add:
      - ALL
    entrypoint: ["/entrypoint.sh"]
    environment:
      - TZ=America/Sao_Paulo
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - ./entrypoint-db01.sh:/entrypoint.sh:ro
      - db01-mysql:/var/lib/mysql
    networks:
      lab-internal:
        ipv4_address: 10.10.10.20
    ports:
      - "3306:3306"     # MariaDB
      - "2220:22"       # SSH
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - mon01

  # ─── BACKUP ───
  bkp01:
    image: monitoring-lab/bkp01:v1
    container_name: lab-bkp01
    hostname: lab-bkp01
    privileged: true
    cap_add:
      - ALL
    entrypoint: ["/entrypoint.sh"]
    environment:
      - TZ=America/Sao_Paulo
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - ./entrypoint-bkp01.sh:/entrypoint.sh:ro
      - bkp01-backups:/backups
    networks:
      lab-internal:
        ipv4_address: 10.10.10.30
    ports:
      - "2230:22"       # SSH
    restart: unless-stopped
    depends_on:
      - mon01

  # ─── ALERTMANAGER ───
  alertmanager:
    image: prom/alertmanager:latest
    container_name: lab-alertmanager
    hostname: lab-alertmanager
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      lab-internal:
        ipv4_address: 10.10.10.41
    ports:
      - "9093:9093"
    restart: unless-stopped

  # ─── NODE EXPORTER ───
  node-exporter:
    image: prom/node-exporter:latest
    container_name: lab-node-exporter
    hostname: lab-node-exporter
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      lab-internal:
        ipv4_address: 10.10.10.42
    ports:
      - "9100:9100"
    restart: unless-stopped

  # ─── OPENSEARCH ───
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: lab-opensearch
    hostname: lab-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-changeme}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      lab-internal:
        ipv4_address: 10.10.10.45
    ports:
      - "9200:9200"
    restart: unless-stopped

  # ─── OPENSEARCH DASHBOARDS ───
  opensearch-dash:
    image: opensearchproject/opensearch-dashboards:2.12.0
    container_name: lab-opensearch-dash
    hostname: lab-opensearch-dash
    environment:
      - OPENSEARCH_HOSTS=["http://10.10.10.45:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    networks:
      lab-internal:
        ipv4_address: 10.10.10.46
    ports:
      - "5601:5601"
    restart: unless-stopped
    depends_on:
      - opensearch

  # ─── LOGSTASH ───
  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: lab-logstash
    hostname: lab-logstash
    volumes:
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks:
      lab-internal:
        ipv4_address: 10.10.10.44
    ports:
      - "5044:5044"
    restart: unless-stopped
    depends_on:
      - opensearch

  # ─── FLUENT BIT ───
  fluentbit:
    image: fluent/fluent-bit:3.0
    container_name: lab-fluentbit
    hostname: lab-fluentbit
    volumes:
      - ./config/fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      lab-internal:
        ipv4_address: 10.10.10.43
    restart: unless-stopped
    depends_on:
      - logstash


  # ─── PROXMOX MOCK ───
  proxmox-mock:
    image: monitoring-lab/proxmox-mock:v1
    container_name: lab-proxmox-mock
    hostname: lab-proxmox-mock
    networks:
      lab-internal:
        ipv4_address: 10.10.10.47
    ports:
      - "8006:8006"
    restart: unless-stopped


  # ─── K3S (Kubernetes leve) ───
  k3s:
    image: rancher/k3s:v1.28.5-k3s1
    container_name: lab-k3s
    hostname: lab-k3s
    privileged: true
    tmpfs:
      - /run
      - /var/run
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - ./config/k3s:/output
    networks:
      lab-internal:
        ipv4_address: 10.10.10.48
    ports:
      - "6443:6443"
    command: server --disable=traefik
    restart: unless-stopped


volumes:
  mon01-mysql:
  mon01-prometheus:
  mon01-grafana:
  web01-www:
  db01-mysql:
  bkp01-backups:
  opensearch-data:
  k3s-server:
